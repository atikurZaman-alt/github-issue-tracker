<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Issues Tracker</title>

    <!-- tailwinds and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="bg-gray-100 font-geist">
    <script>
      const isLoggedIn = localStorage.getItem("loggedIn");
      if (isLoggedIn !== "true") {
        window.location.replace("login.html");
      }
    </script>

    <!-- navbar part -->

    <div class="navbar bg-white shadow px-10">
      <div class="flex-1 flex items-center gap-2">
        <img class="w-10 h-10 mr-3"
          src="./assets/github-logo.png"
          alt=""
        />
        <h1 class="text-[20px] font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-2">
        <input
          id="searchInput"
          type="text"
          placeholder="Search issues..."
          class="input input-bordered"
        />

        <button onclick="searchIssue()" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i>Search
        </button>
      </div>
    </div>

    <!-- main container started -->

    <div class="max-w-[1280px] mx-auto mt-10">
    
      <!-- tab buttons section -->

      <div class="bg-white p-5 rounded shadow">
        <div class="flex gap-2 mb-4">
          <button class="btn btn-primary tabBtn" onclick="loadIssues('all')">
            All
          </button>

          <button class="btn tabBtn" onclick="loadIssues('open')">Open</button>

          <button class="btn tabBtn" onclick="loadIssues('closed')">
            Closed
          </button>
        </div>

        <div class="flex justify-between items-center">
          <div class="flex items-center gap-2">
            <img
              class="border border-[#ECE4FF] rounded-full border-8"
              src="./assets/Aperture.png"
              alt=""
            />
            <div class="flex flex-col">
              <span class="text-lg font-semibold" id="issueCount"
                >0 Issues</span
              >
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-6 text-sm">
            <span class="font-bold text-[16px] flex items-center gap-1">
              <img src="./assets/green.png" alt="" /> Open</span
            >
            <span class="font-bold text-[14px] flex items-center gap-1"
              ><img src="./assets/purple.png" alt="" />Closed</span
            >
          </div>
        </div>
      </div>

    <!-- loading indicator -->

      <div id="loading" class="text-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
      </div>

    <!-- issues container -->

      <div
        id="issuesContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6"
      ></div>
    </div>

  <!-- issue modal -->

    <dialog id="issueModal" class="modal">
      <div class="modal-box max-w-xl p-6">
        <h3 id="modalTitle" class="text-[20px] font-bold mb-2"></h3>

        <div class="flex items-center gap-3 mb-4">
          <span
            id="modalStatus"
            class="px-3 py-1 text-[12px] rounded-full bg-green-100 text-green-600 font-semibold"
          >
          </span>

          <span class="text-[14px] text-[#64748B]">
            Opened by <b id="modalAuthor"></b> | <span id="modalDate"></span>
          </span>
        </div>

        <div class="flex gap-2 mb-4">
          <span
            id="modalCategory"
            class="px-3 py-1 text-xs rounded-full bg-red-100 text-red-600 font-semibold"
          >
          </span>

          <span
            class="px-3 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700 font-semibold"
          >
            HELP WANTED
          </span>
        </div>

        <p id="modalDesc" class="text-[#64748B] mb-6"></p>

        <div class="flex justify-between bg-gray-100 rounded p-4">
          <div>
            <p class="text-[12px] text-[#64748B]">Assignee:</p>
            <p id="modalAssignee" class="font-semibold"></p>
          </div>

          <div class="text-right">
            <p class="text-[12px] text-[#64748B]">Priority:</p>
            <span
              id="modalPriority"
              class="px-3 py-1 text-xs rounded-full bg-red-500 text-white font-semibold"
            >
            </span>
          </div>
        </div>

        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="scripts.js"></script>
  </body>
</html>
