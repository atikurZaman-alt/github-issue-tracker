<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Issues Tracker</title>

     <!-- tailwinds and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

  </head>

  <body class="bg-gray-100">
    <script>
      const isLoggedIn = localStorage.getItem("loggedIn");
      if (isLoggedIn !== "true") {
        window.location.replace("login.html");
      }
    </script>

    <!-- NAVBAR -->

    <div class="navbar bg-white shadow px-10">
      <div class="flex-1 flex items-center gap-2">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10 mr-3">
        <h1 class="text-xl font-bold"> GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-2">
        <input
          id="searchInput"
          type="text"
          placeholder="Search issues..."
          class="input input-bordered"
        />

        <button onclick="searchIssue()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>Search</button>

      
      </div>
    </div>

    <!-- MAIN CONTAINER -->

    <script src="scripts.js"></script>
  </body>
</html>
